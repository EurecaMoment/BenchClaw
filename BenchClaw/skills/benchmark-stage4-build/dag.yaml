stage: stage4
stage_name: 评测集合成、指标代码与质量过滤
version: 4.0-opencode-ready
principle: DAG/ready-set scheduling. 09/18/19/20 are roots. Small-batch synthesis and gray test are preserved as graph nodes but intentionally blank per user instruction; all other nodes are normal Stage4 skill contracts.
source_diagram_interpretation:
  09: Stage1 的初版模板集与指标集，图中作为“模板”来源进入 Stage4。
  18: Stage3 的真实图片+半监督 GT。
  19: Stage3 的已有 benchmark 图文/QA/标签+半监督 GT。
  20: Stage3 的仿真器多模态数据+清洗后的 privileged GT。
  模板: 把 09 规范化为模板契约、证据契约和指标契约。
  对象/关系/能力/题型选择: 从 18/19/20 的 evidence pool 中为模板选择可证明的对象、空间关系、动作/属性约束、题型与干扰项。
  小批量合成+灰度测试: 按用户要求留空，但保留图中节点位置与 DONE/WAIVED 契约。
  质量检查: 结构性检查正常实现；CTT/IRT、CDM/Q-matrix、Qwen-scope/Gemma-scope/Llama-scope 等需要 pilot/model-response 的检查作为 deferred hooks 输出。
  全量合成: 使用通过质量过滤的 blueprint 与 answer program 生成全量 evalset。
nodes:
  09:
    name: stage1-template-metric-ingest
    skill: skills/09-stage1-template-metric-ingest/SKILL.md
    parents:

    output_dir: WORKSPACE_ROOT/stage4/09-stage1-template-metric-ingest
    role: Ingest Stage1 node-09 initial template set and metric set as read-only Stage4 source.
  18:
