forbidden_interpretations:
  - Do not run 09→18→19→20→28→29 as a serial chain; 09/18/19/20 are independent roots.
  - Do not make 18 depend on 19 or 20, or 19 depend on 18 or 20, in Stage4 ingestion.
  - Do not let synthetic question text become GT. Answers must be computed from evidence contracts or answer programs.
  - Do not fill node 33 or node 34 in this pack; they are intentionally blank/waived.
  - Do not execute pilot-dependent CTT/IRT/CDM/scope conclusions without pilot/model-response data.
  - Do not allow full-scale synthesis to bypass traceability from item -> blueprint -> evidence -> source GT.
