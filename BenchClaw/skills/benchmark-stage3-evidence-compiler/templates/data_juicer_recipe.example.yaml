# Data-Juicer-style recipe example for Stage3.
# Replace operators with the installed Data-Juicer version and local data schema.
project_name: benchclaw_stage3
np: 8
export_path: cleaned_records.jsonl
process:
  - image_shape_filter:
      min_width: 128
      min_height: 128
  - image_blur_filter:
      threshold: 100
  - text_length_filter:
      min_len: 0
  - document_deduplicator:
      lowercase: true
  - specified_field_filter:
      field_key: record_id
      op: exists
