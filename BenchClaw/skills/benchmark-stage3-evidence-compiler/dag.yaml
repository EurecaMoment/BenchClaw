stage: stage3
node_semantics: only listed nodes are DAG nodes; data ids are artifacts
nodes:
  - id: stage3-plan-generation
    name: 本阶段执行计划生成
    skill: skills/stage3-plan-generation/SKILL.md
    parents: []
    outputs: [stage3_execution_plan]
  - id: real-image-cleaning
    name: 真实图片清洗
    skill: skills/real-image-cleaning/SKILL.md
    parents: [stage3-plan-generation]
    outputs: [real_image_clean_bundle]
  - id: existing-benchmark-cleaning
    name: 已有 benchmark 数据清洗
    skill: skills/existing-benchmark-cleaning/SKILL.md
    parents: [stage3-plan-generation]
    outputs: [existing_benchmark_clean_bundle]
  - id: simulator-data-cleaning
    name: 仿真器数据清洗
    skill: skills/simulator-data-cleaning/SKILL.md
    parents: [stage3-plan-generation]
    outputs: [simulator_clean_bundle]
  - id: real-image-annotation
    name: 真实图片标注
    skill: skills/real-image-annotation/SKILL.md
    parents: [real-image-cleaning]
    outputs: [data_17_annotated_real_image_bundle]
  - id: existing-benchmark-annotation
    name: 已有 benchmark 标注
    skill: skills/existing-benchmark-annotation/SKILL.md
    parents: [existing-benchmark-cleaning]
    outputs: [data_18_annotated_existing_benchmark_bundle]
  - id: simulator-data-organization
    name: 仿真器数据整理
    skill: skills/simulator-data-organization/SKILL.md
    parents: [simulator-data-cleaning]
    outputs: [data_19_annotated_simulator_bundle]
