  - id: existing-benchmark-evidence-compilation
    name: 已有 benchmark 清洗与标注
    skill: skills/existing-benchmark-evidence-compilation/SKILL.md
    parents: [stage3-plan-generation]
    required_inputs: [stage3_execution_plan, data_15_existing_benchmark_collection_bundle]
    outputs: [data_18_annotated_existing_benchmark_bundle]
  - id: simulator-evidence-compilation
    name: 仿真器清洗与标注
    skill: skills/simulator-evidence-compilation/SKILL.md
