stage: stage3
node_semantics: only listed nodes are DAG nodes; data ids are artifacts; cleaning and annotation are internal subskills under each source node
nodes:
  - id: stage3-plan-generation
    name: 本阶段执行计划生成
    skill: skills/stage3-plan-generation/SKILL.md
    parents: []
    required_inputs: [data_13_execution_plan, data_14_real_image_collection_bundle, data_15_existing_benchmark_collection_bundle, data_16_simulator_collection_bundle]
    outputs: [stage3_execution_plan]
  - id: real-image-evidence-compilation
    name: 真实图片清洗与标注
    skill: skills/real-image-evidence-compilation/SKILL.md
    parents: [stage3-plan-generation]
    required_inputs: [stage3_execution_plan, data_14_real_image_collection_bundle]
